version: '3.8'

services:
  # Локальная LLM (Qwen 2.5-14B через vLLM)
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: qwen_vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    ports:
      - "8002:8002"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --port 8002 --model Qwen/Qwen2.5-7B-Instruct-AWQ --quantization awq --max-model-len 2048 --max-num-seqs 16 --gpu-memory-utilization 0.8 --enforce-eager
    ipc: host
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\"" ]
      interval: 15s
      timeout: 5s
      start_period: 1600s
      retries: 10
    restart: unless-stopped

  # FastAPI Voice Assistant (Whisper + Silero TTS + VAD)
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice_api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - LLM_BASE_URL=http://vllm-server:8002/v1
    volumes:
      # Кеш Whisper-модели — не скачивается заново при пересборке
      - whisper-cache:/root/.cache/huggingface
      # Кеш Silero TTS
      - torch-hub-cache:/root/.cache/torch
      # Логи диалогов — доступны на хосте
      - ./logs:/app/logs
    depends_on:
      vllm-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  whisper-cache:
  torch-hub-cache:
